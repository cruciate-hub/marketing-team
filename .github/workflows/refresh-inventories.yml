name: Refresh static-page inventories

# Reconciler for pages-marketing.json and pages-industry.json (the two
# static-page inventories). The Webflow-publish webhook regenerates them
# best-effort, but a single worker invocation's background window can't
# always cover both — this job calls the worker's synchronous /generate
# endpoints, which run with a full budget while the connection is held.
# CMS inventories (blog, glossary, …) stay event-driven via the CMS webhook.
#
# Requires the WORKER_AUTH_TOKEN repository secret (the Cloudflare worker's
# auth token):  gh secret set WORKER_AUTH_TOKEN --repo cruciate-hub/marketing-team

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: refresh-inventories
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh marketing + industry inventories
        env:
          WORKER_AUTH_TOKEN: ${{ secrets.WORKER_AUTH_TOKEN }}
        run: |
          if [ -z "$WORKER_AUTH_TOKEN" ]; then
            echo "::warning::WORKER_AUTH_TOKEN secret not set — skipping refresh."
            exit 0
          fi
          set -e
          for target in industry marketing; do
            echo "Refreshing $target…"
            resp=$(curl -sS --max-time 480 \
              "https://socialplus-site-json.stefan-c10.workers.dev/generate/$target?token=$WORKER_AUTH_TOKEN")
            echo "$resp"
            echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if d.get('ok') else 1)"
          done
