<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse — Brand Messaging Auditor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { figtree: ['Figtree', 'Inter', 'sans-serif'] },
          colors: {
            brand: { blue: '#3B41EC', hover: '#272B9D', pressed: '#27265E', transparent: 'rgba(42, 49, 233, 0.1)' },
            surface: { 0: '#111111', 1: '#1e1e1e', 2: '#272727', 3: '#2e2e2e' },
            bdark: { DEFAULT: '#232324', hover: '#39393A' },
            txt: { primary: '#FFFFFF', secondary: '#D0D0D1', muted: '#A0A1A3', disabled: '#717275' },
            status: { red: '#FF305A', orange: '#F66005', yellow: '#F7C506', green: '#1DC497', pink: '#F568F0', purple: '#9F72FF', sky: '#45A5ED', blue: '#3769EC' },
          },
        },
      },
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Figtree', 'Inter', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .btn-primary { background: linear-gradient(135deg, #3769EC 0%, #3B41EC 50%, #45A5ED 100%); transition: all 0.15s ease; border-radius: 8px; }
    .btn-primary:hover { filter: brightness(1.08); box-shadow: 0 4px 16px rgba(59, 65, 236, 0.4); }
    .btn-primary:focus-visible { outline: 2px solid #3B41EC; outline-offset: 3px; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.3); transition: all 0.15s ease; border-radius: 8px; }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.6); }
    .btn-secondary:focus-visible { outline: 2px solid #3B41EC; outline-offset: 3px; }
    .btn-secondary:active { transform: scale(0.97); }
    .card-elevated { box-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .modal-elevated { box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    .brand-gradient-bg { background: linear-gradient(135deg, #3769EC 0%, #3B41EC 50%, #45A5ED 100%); }
    #error-display { display: none; position: fixed; top: 0; left: 0; right: 0; background: #fee2e2; color: #991b1b; padding: 16px; font-family: monospace; font-size: 13px; z-index: 99999; white-space: pre-wrap; max-height: 50vh; overflow: auto; }
  </style>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var el = document.getElementById('error-display');
      if (el) { el.style.display = 'block'; el.textContent += msg + ' (line ' + line + ')\n'; }
      console.error('Runtime error:', msg, 'at line', line);
      return false;
    };
  </script>
</head>
<body>
  <div id="error-display"></div>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    // ─── Configuration ───────────────────────────────────────────────
    // Change this to your deployed Worker URL. Use "" for same-origin or local dev.
    const WORKER_URL = "https://lighthouse-auditor.cruciate-hub.workers.dev";

    // ─── SVG Icon Components ─────────────────────────────────────────
    const SvgIcon = ({ children, size = 24, className = "", ...rest }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth={2} strokeLinecap="round"
        strokeLinejoin="round" className={className} {...rest}>
        {children}
      </svg>
    );

    const X = (p) => <SvgIcon {...p}><path d="M18 6 6 18"/><path d="M6 6 18 18"/></SvgIcon>;
    const FileText = (p) => <SvgIcon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></SvgIcon>;
    const ChevronRight = (p) => <SvgIcon {...p}><path d="m9 18 6-6-6-6"/></SvgIcon>;
    const ChevronLeft = (p) => <SvgIcon {...p}><path d="m15 18-6-6 6-6"/></SvgIcon>;
    const CheckCircle = (p) => <SvgIcon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></SvgIcon>;
    const AlertCircle = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></SvgIcon>;
    const Globe = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10Z"/></SvgIcon>;
    const FileUp = (p) => <SvgIcon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></SvgIcon>;
    const Clipboard = (p) => <SvgIcon {...p}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></SvgIcon>;
    const Play = (p) => <SvgIcon {...p}><polygon points="6 3 20 12 6 21 6 3"/></SvgIcon>;
    const Download = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></SvgIcon>;
    const Copy = (p) => <SvgIcon {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></SvgIcon>;
    const RefreshCw = (p) => <SvgIcon {...p}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></SvgIcon>;
    const Filter = (p) => <SvgIcon {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></SvgIcon>;
    const Clock = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SvgIcon>;
    const Menu = (p) => <SvgIcon {...p}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></SvgIcon>;
    const Zap = (p) => <SvgIcon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></SvgIcon>;
    const BookOpen = (p) => <SvgIcon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></SvgIcon>;
    const Sun = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></SvgIcon>;
    const Moon = (p) => <SvgIcon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></SvgIcon>;
    const Settings = (p) => <SvgIcon {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
    const AlertTriangle = (p) => <SvgIcon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></SvgIcon>;
    const BarChart3 = (p) => <SvgIcon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></SvgIcon>;
    const Columns = (p) => <SvgIcon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></SvgIcon>;
    const ExternalLink = (p) => <SvgIcon {...p}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></SvgIcon>;
    const Eye = (p) => <SvgIcon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
    const Grid3X3 = (p) => <SvgIcon {...p}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></SvgIcon>;
    const Info = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></SvgIcon>;
    const Layers = (p) => <SvgIcon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></SvgIcon>;
    const Link = (p) => <SvgIcon {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></SvgIcon>;
    const List = (p) => <SvgIcon {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></SvgIcon>;
    const MessageSquare = (p) => <SvgIcon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></SvgIcon>;
    const Shield = (p) => <SvgIcon {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></SvgIcon>;
    const Target = (p) => <SvgIcon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></SvgIcon>;
    const Upload = (p) => <SvgIcon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></SvgIcon>;

    // ─── Recharts (with fallback) ────────────────────────────────────
    const RechartsOK = typeof Recharts !== 'undefined';
    const RC = RechartsOK ? Recharts : {};

    // ─── Constants ───────────────────────────────────────────────────
    const QUICK_PAGES = [
      { label: "Homepage", url: "https://social.plus", icon: "🏠" },
      { label: "Product", url: "https://social.plus/product", icon: "📦" },
      { label: "Pricing", url: "https://social.plus/pricing", icon: "💰" },
      { label: "About", url: "https://social.plus/about", icon: "ℹ️" },
      { label: "Analytics", url: "https://social.plus/analytics", icon: "📊" },
      { label: "Monetization", url: "https://social.plus/monetization", icon: "🎯" },
      { label: "Chat", url: "https://social.plus/chat", icon: "💬" },
      { label: "Social", url: "https://social.plus/social", icon: "👥" },
      { label: "Blog", url: "https://social.plus/blog", icon: "📝" },
    ];

    const ANALYSIS_MODES = [
      { id: "full", label: "Full Audit", icon: BarChart3, desc: "Complete analysis against all rules" },
      { id: "terminology", label: "Terminology", icon: BookOpen, desc: "Approved & forbidden terms check" },
      { id: "hierarchy", label: "Hierarchy", icon: Layers, desc: "Message structure & ordering" },
      { id: "tone", label: "Tone of Voice", icon: MessageSquare, desc: "Confidence, energy, structure" },
      { id: "persona", label: "Persona Lens", icon: Target, desc: "CPO / CTO / Developer view" },
      { id: "positioning", label: "Positioning", icon: Shield, desc: "Category & competitor framing" },
    ];

    const CONTENT_TYPES = [
      "Webpage", "Email", "Social Post", "Presentation", "Sales Deck",
      "Blog Post", "Ad Copy", "Product Copy", "Press Release", "Internal Doc"
    ];

    const SEVERITY_CONFIG = {
      critical: { color: "bg-status-red", text: "text-status-red", bg: "bg-status-red/10", border: "border-status-red/30", icon: AlertCircle, label: "Critical" },
      warning: { color: "bg-status-orange", text: "text-status-orange", bg: "bg-status-orange/10", border: "border-status-orange/30", icon: AlertTriangle, label: "Warning" },
      suggestion: { color: "bg-status-sky", text: "text-status-sky", bg: "bg-status-sky/10", border: "border-status-sky/30", icon: Info, label: "Suggestion" },
    };

    // ─── Main Component ──────────────────────────────────────────────
    function Lighthouse() {
      const [darkMode, setDarkMode] = useState(true);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [view, setView] = useState("input"); // input | dashboard | annotated | sidebyside | heatmap
      const [inputMode, setInputMode] = useState("url"); // url | upload | paste
      const [urlValue, setUrlValue] = useState("");
      const [pasteValue, setPasteValue] = useState("");
      const [uploadedFileContent, setUploadedFileContent] = useState("");
      const [uploadedFileName, setUploadedFileName] = useState("");
      const [contentType, setContentType] = useState("Webpage");
      const [contentLabel, setContentLabel] = useState("");
      const [analysisMode, setAnalysisMode] = useState("full");
      const [messagingDoc, setMessagingDoc] = useState({ name: "Live from GitHub", loaded: true });
      const [docPanelOpen, setDocPanelOpen] = useState(false);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [selectedFinding, setSelectedFinding] = useState(null);
      const [severityFilter, setSeverityFilter] = useState("all");
      const [categoryFilter, setCategoryFilter] = useState("all");
      const [analyzing, setAnalyzing] = useState(false);
      const [analyzeStep, setAnalyzeStep] = useState(0);
      const [expandedFindings, setExpandedFindings] = useState(new Set());
      const [error, setError] = useState(null);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [analyzedLabel, setAnalyzedLabel] = useState("");
      const fileInputRef = useRef(null);
      const docInputRef = useRef(null);

      // Persist history in localStorage
      const [history, setHistory] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem("lighthouse-history") || "[]");
        } catch { return []; }
      });

      // Derived from analysis result
      const findings = analysisResult?.findings || [];
      const dimensions = analysisResult?.dimensions || [];
      const terms = analysisResult?.terms || { approved: [], forbidden: [] };
      const overallScore = analysisResult?.overallScore || 0;
      const criticalCount = findings.filter(f => f.severity === "critical").length;
      const warningCount = findings.filter(f => f.severity === "warning").length;
      const suggestionCount = findings.filter(f => f.severity === "suggestion").length;

      const filteredFindings = findings.filter(f => {
        if (severityFilter !== "all" && f.severity !== severityFilter) return false;
        if (categoryFilter !== "all" && f.category !== categoryFilter) return false;
        return true;
      });

      const categories = [...new Set(findings.map(f => f.category))];

      const toggleFinding = (id) => {
        setExpandedFindings(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };

      // ─── File Upload Handler ────────────────────
      const handleFileUpload = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setUploadedFileName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => {
          let text = ev.target.result;
          // If HTML, extract text content
          if (file.name.endsWith(".html") || file.name.endsWith(".htm")) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, "text/html");
            text = doc.body.textContent || "";
          }
          setUploadedFileContent(text);
        };
        reader.readAsText(file);
      };

      // ─── Real Analysis Handler ──────────────────
      const handleAnalyze = async (urlOverride) => {
        setAnalyzing(true);
        setError(null);
        setAnalyzeStep(0);

        // Animate steps
        const stepTimer = setInterval(() => {
          setAnalyzeStep(prev => Math.min(prev + 1, 3));
        }, 2000);

        try {
          let content = "";
          let sourceUrl = null;
          let label = "";

          if (inputMode === "url") {
            const url = urlOverride || urlValue.trim();
            if (!url) throw new Error("Please enter a URL");
            sourceUrl = url;
            label = sourceUrl.replace("https://", "");

            // Step 1: Extract content from URL
            setAnalyzeStep(0);
            const extractRes = await fetch(`${WORKER_URL}/extract`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: sourceUrl }),
            });
            if (!extractRes.ok) {
              const err = await extractRes.json().catch(() => ({}));
              throw new Error(err.error || `Failed to extract content (${extractRes.status})`);
            }
            const extracted = await extractRes.json();
            content = extracted.content;
            if (!content) throw new Error("No content could be extracted from this URL");
          } else if (inputMode === "paste") {
            if (!pasteValue.trim()) throw new Error("Please paste some content");
            content = pasteValue;
            label = contentLabel || "Pasted content";
          } else if (inputMode === "upload") {
            if (!uploadedFileContent) throw new Error("Please upload a file first");
            content = uploadedFileContent;
            label = uploadedFileName;
          }

          // Step 2-3: Analyze content
          setAnalyzeStep(1);
          const analyzeRes = await fetch(`${WORKER_URL}/analyze`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content,
              contentType,
              sourceUrl,
              mode: analysisMode,
            }),
          });

          if (!analyzeRes.ok) {
            const err = await analyzeRes.json().catch(() => ({}));
            throw new Error(err.error || `Analysis failed (${analyzeRes.status})`);
          }

          const result = await analyzeRes.json();
          setAnalysisResult(result);
          setAnalyzedLabel(label);
          setExpandedFindings(new Set());
          setSeverityFilter("all");
          setCategoryFilter("all");
          setView("dashboard");

          // Save to history
          const entry = {
            url: label,
            date: new Date().toLocaleString(),
            score: result.overallScore,
          };
          const updated = [entry, ...history].slice(0, 20);
          setHistory(updated);
          localStorage.setItem("lighthouse-history", JSON.stringify(updated));

        } catch (err) {
          setError(err.message);
        } finally {
          clearInterval(stepTimer);
          setAnalyzing(false);
        }
      };

      const handleQuickPage = (url) => {
        setUrlValue(url);
        setInputMode("url");
      };

      // Quick page auto-analyze — pass URL directly to avoid stale state race
      const [pendingQuickUrl, setPendingQuickUrl] = useState(null);
      const handleQuickAnalyze = (url) => {
        setUrlValue(url);
        setInputMode("url");
        setPendingQuickUrl(url);
      };
      useEffect(() => {
        if (pendingQuickUrl) {
          setPendingQuickUrl(null);
          handleAnalyze(pendingQuickUrl);
        }
      }, [pendingQuickUrl]);

      const getScoreColor = (score) => {
        if (score >= 80) return "text-status-green";
        if (score >= 60) return "text-status-orange";
        return "text-status-red";
      };

      const getScoreRingColor = (score) => {
        if (score >= 80) return "#1DC497";
        if (score >= 60) return "#F66005";
        return "#FF305A";
      };

      const bg = darkMode ? "bg-surface-0" : "bg-gray-50";
      const cardBg = darkMode ? "bg-surface-1" : "bg-white";
      const borderColor = darkMode ? "border-bdark" : "border-gray-200";
      const textPrimary = darkMode ? "text-white" : "text-gray-900";
      const textSecondary = darkMode ? "text-txt-secondary" : "text-gray-500";
      const textMuted = darkMode ? "text-txt-muted" : "text-gray-400";
      const inputBg = darkMode ? "bg-surface-2" : "bg-gray-100";
      const inputBorder = darkMode ? "border-bdark-hover" : "border-gray-300";
      const hoverBg = darkMode ? "hover:bg-surface-2" : "hover:bg-gray-100";

      // ─── Error Banner ──────────────────────────
      const ErrorBanner = () => error ? (
        <div className="fixed top-0 left-0 right-0 z-50 bg-status-red/90 text-white px-4 py-3 flex items-center justify-between" style={{ backdropFilter: "blur(8px)" }}>
          <div className="flex items-center gap-2">
            <AlertCircle size={16} />
            <span className="text-sm">{error}</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => { setError(null); handleAnalyze(); }}
              className="text-xs px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition-colors" style={{ borderRadius: 8 }}>
              Retry
            </button>
            <button onClick={() => setError(null)} className="text-white/70 hover:text-white">
              <X size={16} />
            </button>
          </div>
        </div>
      ) : null;

      // ─── Analyzing Overlay ─────────────────────
      const AnalyzingOverlay = () => (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm">
          <div className={`${cardBg} rounded-2xl p-10 flex flex-col items-center gap-6 modal-elevated max-w-sm w-full mx-4`}>
            <div className="relative w-20 h-20">
              <div className="absolute inset-0 rounded-full border-4 border-bdark-hover opacity-30" />
              <div className="absolute inset-0 rounded-full border-4 border-t-brand-blue animate-spin" />
              <div className="absolute inset-3 rounded-full border-4 border-bdark-hover opacity-20" />
              <div className="absolute inset-3 rounded-full border-4 border-t-status-sky animate-spin" style={{ animationDirection: "reverse", animationDuration: "1.5s" }} />
            </div>
            <div className="text-center">
              <p className={`text-lg font-semibold ${textPrimary}`}>Analyzing content...</p>
              <p className={`text-sm ${textSecondary} mt-2`}>Checking against messaging framework</p>
            </div>
            <div className="w-full space-y-2">
              {["Extracting content", "Checking terminology", "Analyzing hierarchy & tone", "Scoring dimensions"].map((step, i) => (
                <div key={step} className="flex items-center gap-3">
                  <div className={`w-5 h-5 rounded-full flex items-center justify-center ${i <= analyzeStep ? "bg-brand-blue/20" : "bg-surface-2/40"}`}>
                    {i <= analyzeStep ? <CheckCircle size={12} className="text-brand-blue" /> : <div className="w-2 h-2 rounded-full bg-txt-muted animate-pulse" />}
                  </div>
                  <span className={`text-sm ${i <= analyzeStep ? textSecondary : textMuted}`}>{step}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ─── Score Ring ─────────────────────────────
      const ScoreRing = ({ score, size = 140 }) => {
        const r = (size - 16) / 2;
        const circ = 2 * Math.PI * r;
        const offset = circ - (score / 100) * circ;
        return (
          <div className="relative" style={{ width: size, height: size }}>
            <svg width={size} height={size} className="-rotate-90">
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={darkMode ? "#272727" : "#e5e7eb"} strokeWidth="8" />
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={getScoreRingColor(score)} strokeWidth="8" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} style={{ transition: "stroke-dashoffset 1s ease" }} />
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className={`text-3xl font-bold ${getScoreColor(score)}`}>{score}</span>
              <span className={`text-xs ${textMuted}`}>/ 100</span>
            </div>
          </div>
        );
      };

      // ─── Finding Card ──────────────────────────
      const FindingCard = ({ finding }) => {
        const config = SEVERITY_CONFIG[finding.severity];
        const Icon = config.icon;
        const expanded = expandedFindings.has(finding.id);
        return (
          <div className={`${cardBg} border ${borderColor} rounded-xl overflow-hidden transition-all ${darkMode ? "card-elevated" : ""}`}>
            <button onClick={() => toggleFinding(finding.id)} className={`w-full flex items-start gap-3 p-4 text-left ${hoverBg} transition-colors`}>
              <div className={`mt-0.5 p-1.5 rounded-lg ${config.bg}`}>
                <Icon size={14} className={config.text} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${config.bg} ${config.text}`}>{config.label}</span>
                  <span className={`text-xs px-2 py-0.5 rounded-full ${darkMode ? "bg-surface-2 text-txt-secondary" : "bg-gray-100 text-gray-500"}`}>{finding.category}</span>
                  <span className={`text-xs ${textMuted}`}>{finding.location ? `· ${finding.location}` : ""}</span>
                </div>
                <p className={`text-sm font-medium ${textPrimary} mt-1.5`}>
                  {finding.text} <span className={textSecondary}>{finding.explanation ? `— ${finding.explanation.slice(0, 80)}...` : ""}</span>
                </p>
              </div>
              <ChevronRight size={16} className={`${textMuted} mt-1 transition-transform ${expanded ? "rotate-90" : ""}`} />
            </button>
            {expanded && (
              <div className={`px-4 pb-4 pt-0 border-t ${borderColor}`}>
                <div className="pt-4 space-y-4">
                  <div>
                    <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-1`}>Explanation</p>
                    <p className={`text-sm ${textSecondary} leading-relaxed`}>{finding.explanation}</p>
                  </div>
                  <div>
                    <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-1`}>Doc Reference</p>
                    <p className={`text-sm text-brand-blue`}>{finding.docRef}</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div className={`p-3 rounded-lg ${darkMode ? "bg-status-red/5 border border-status-red/20" : "bg-red-50 border border-red-200"}`}>
                      <p className={`text-xs font-medium text-status-red mb-1`}>Current</p>
                      <p className={`text-sm ${textSecondary}`}>{finding.original}</p>
                    </div>
                    <div className={`p-3 rounded-lg ${darkMode ? "bg-status-green/5 border border-status-green/20" : "bg-green-50 border border-green-200"}`}>
                      <p className={`text-xs font-medium text-status-green mb-1`}>Suggested</p>
                      <p className={`text-sm ${textSecondary}`}>{finding.revised}</p>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => navigator.clipboard.writeText(finding.revised)}
                      className="text-xs px-3 py-1.5 bg-brand-blue/10 text-brand-blue hover:bg-brand-blue/20 transition-colors" style={{ borderRadius: 8 }}>Copy suggestion</button>
                    <button className={`text-xs px-3 py-1.5 ${darkMode ? "bg-surface-2 text-txt-secondary hover:bg-bdark-hover" : "bg-gray-100 text-gray-500 hover:bg-gray-200"} transition-colors`} style={{ borderRadius: 8 }}>Dismiss</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      // ─── Input View ────────────────────────────
      const InputView = () => (
        <div className="max-w-3xl mx-auto space-y-6">
          <div className="text-center pt-6 pb-2">
            <h1 className={`text-2xl font-bold ${textPrimary}`}>Analyze Content</h1>
            <p className={`${textSecondary} mt-1`}>Check any content against your messaging framework</p>

          {/* Analysis Mode Selector */}
          <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
            {ANALYSIS_MODES.map(mode => (
              <button key={mode.id} onClick={() => setAnalysisMode(mode.id)}
                className={`p-3 rounded-xl border text-center transition-all ${analysisMode === mode.id
                  ? `border-brand-blue/50 ${darkMode ? "bg-brand-blue/10" : "bg-brand-blue/5"}`
                  : `${borderColor} ${cardBg} ${hoverBg}`}`}>
                <mode.icon size={18} className={`mx-auto mb-1.5 ${analysisMode === mode.id ? "text-brand-blue" : textMuted}`} />
                <p className={`text-xs font-medium ${analysisMode === mode.id ? "text-brand-blue" : textSecondary}`}>{mode.label}</p>
              </button>
            ))}
          </div>

          {/* Input Mode Tabs */}
          <div className={`${cardBg} border ${borderColor} rounded-2xl overflow-hidden ${darkMode ? "card-elevated" : ""}`}>
            <div className={`flex border-b ${borderColor}`}>
              {[
                { id: "url", label: "URL / Link", icon: Link },
                { id: "upload", label: "Upload File", icon: Upload },
                { id: "paste", label: "Paste Text", icon: Clipboard },
              ].map(tab => (
                <button key={tab.id} onClick={() => setInputMode(tab.id)}
                  className={`flex-1 flex items-center justify-center gap-2 px-4 py-3.5 text-sm font-medium transition-colors ${

                      ? `${darkMode ? "bg-surface-2" : "bg-gray-100"} ${textPrimary} border-b-2 border-brand-blue`

            <div className="p-6">
              {inputMode === "url" && (

                          <span className={`text-xs ${textSecondary} truncate`}>{page.label}</span>
                        </button>

                    </div>
                  </div>
                </div>
              )}

              {inputMode === "upload" && (
                <div className="space-y-4">
                  <button onClick={() => fileInputRef.current?.click()}

                      <>
                        <p className={`text-sm font-medium ${textPrimary}`}>{uploadedFileName}</p>
                        <p className={`text-xs ${textMuted} mt-1`}>{uploadedFileContent.length} characters loaded</p>
                      </>
                    ) : (
                      <>
                        <p className={`text-sm font-medium ${textPrimary}`}>Drop files here or click to browse</p>
                        <p className={`text-xs ${textMuted} mt-1`}>.md, .txt, .html, .csv</p>
                      </>
                    )}
                  </button>
                  <input ref={fileInputRef} type="file" className="hidden" accept=".md,.txt,.html,.csv" onChange={handleFileUpload} />
                </div>
              )}

              {inputMode === "paste" && (
                <div className="space-y-4">
                  <div className="flex gap-3">
                    <select value={contentType} onChange={e => setContentType(e.target.value)}
                      className={`px-3 py-2 rounded-lg ${inputBg} border ${inputBorder} ${textPrimary} text-sm focus:outline-none`}>
                      {CONTENT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                    </select>
                    <input type="text" value={contentLabel} onChange={e => setContentLabel(e.target.value)}
                      placeholder="Label (e.g. 'Homepage hero draft v2')"
                      className={`flex-1 px-3 py-2 rounded-lg ${inputBg} border ${inputBorder} ${textPrimary} text-sm focus:outline-none placeholder:${textMuted}`} />
                  </div>
                  <textarea value={pasteValue} onChange={e => setPasteValue(e.target.value)}
                    placeholder="Paste your content here..."
                    rows={8}
                    className={`w-full px-4 py-3 rounded-xl ${inputBg} border ${inputBorder} ${textPrimary} text-sm focus:outline-none focus:ring-2 focus:ring-brand-blue/40 resize-none placeholder:${textMuted}`} />
                  <div className="flex justify-between">
                    <span className={`text-xs ${textMuted}`}>{pasteValue.length} characters · {pasteValue.split(/\s+/).filter(Boolean).length} words</span>
                    <button onClick={() => navigator.clipboard.readText().then(t => setPasteValue(t)).catch(() => {})}
                      className={`text-xs flex items-center gap-1 ${textMuted} hover:text-brand-blue transition-colors`}>
                      <Clipboard size={12} /> Paste from clipboard
                    </button>
                  </div>
                </div>
              )}
            </div>

            <div className={`px-6 pb-6`}>
              <button id="analyze-btn" onClick={handleAnalyze}
                className="w-full btn-primary text-white font-medium text-sm flex items-center justify-center gap-2" style={{ height: 44, letterSpacing: "0.01em" }}>
                <Play size={16} />
                Run Analysis
              </button>
            </div>
          </div>
        </div>
      );

      // ─── Dashboard View ────────────────────────
      const DashboardView = () => (
        <div className="space-y-6">
          {/* Top Bar */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <div className="flex items-center gap-2">
                <button onClick={() => setView("input")} className={`${textMuted} hover:text-brand-blue transition-colors`}>
                  <ChevronLeft size={18} />
                </button>
                <h2 className={`text-lg font-semibold ${textPrimary}`}>{analyzedLabel || "Analysis"}</h2>
              </div>
              <p className={`text-sm ${textMuted} ml-6`}>{contentType} · {analysisResult?.mode || "full"} audit · analyzed just now</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => {
                const blob = new Blob([JSON.stringify(analysisResult, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a"); a.href = url; a.download = "lighthouse-audit.json"; a.click();
                URL.revokeObjectURL(url);
              }} className={`px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 ${inputBg} ${textSecondary} ${hoverBg} border ${inputBorder}`}>
                <Download size={14} /> Export JSON
              </button>
              <button onClick={() => {
                const summary = findings.map(f => `[${f.severity.toUpperCase()}] ${f.text}: ${f.suggestion}`).join("\n");
                navigator.clipboard.writeText(summary);
              }} className={`px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 ${inputBg} ${textSecondary} ${hoverBg} border ${inputBorder}`}>
                <Copy size={14} /> Copy Summary
              </button>
              <button onClick={() => setView("input")} className={`px-3 py-2 rounded-lg text-xs flex items-center gap-1.5 btn-primary text-white`}>
                <RefreshCw size={14} /> New Analysis
              </button>
            </div>
          </div>

          {/* Score + Radar */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className={`${cardBg} border ${borderColor} rounded-2xl p-6 flex flex-col items-center justify-center ${darkMode ? "card-elevated" : ""}`}>
              <ScoreRing score={overallScore} />
              <p className={`text-sm font-medium ${textPrimary} mt-4`}>Overall Compliance</p>
              <p className={`text-xs ${textMuted} mt-1`}>Based on {findings.length} findings</p>
            </div>

            <div className={`${cardBg} border ${borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>
              <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-4`}>Dimension Scores</p>
              {RechartsOK && dimensions.length > 0 ? (
              <RC.ResponsiveContainer width="100%" height={200}>
                <RC.RadarChart data={dimensions}>
                  <RC.PolarGrid stroke={darkMode ? "#272727" : "#e5e7eb"} />
                  <RC.PolarAngleAxis dataKey="dimension" tick={{ fill: darkMode ? "#A0A1A3" : "#717275", fontSize: 12 }} />
                  <RC.PolarRadiusAxis tick={false} axisLine={false} domain={[0, 100]} />
                  <RC.Radar dataKey="score" stroke="#3B41EC" fill="#3B41EC" fillOpacity={0.15} strokeWidth={2} />
                </RC.RadarChart>
              </RC.ResponsiveContainer>
              ) : (
              <div style={{height: 200}} className="flex items-center justify-center">
                <div className="space-y-2 w-full">
                  {dimensions.map((d, i) => (
                    <div key={i} className="flex items-center gap-3 text-sm">
                      <span className={`w-24 text-right text-xs ${textMuted}`}>{d.dimension}</span>
                      <div className={`flex-1 h-2 rounded-full ${darkMode ? 'bg-surface-2' : 'bg-gray-200'}`}>
                        <div className="h-2 rounded-full bg-brand-blue/50" style={{ width: `${d.score}%` }} />
                      </div>
                      <span className={`w-8 text-xs ${textMuted}`}>{d.score}</span>
                    </div>
                  ))}
                </div>
              </div>
              )}
            </div>

            <div className={`${cardBg} border ${borderColor} rounded-2xl p-6 space-y-4 ${darkMode ? "card-elevated" : ""}`}>
              <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider`}>Issue Breakdown</p>
              {[
                { label: "Critical", count: criticalCount, config: SEVERITY_CONFIG.critical, filter: "critical" },
                { label: "Warnings", count: warningCount, config: SEVERITY_CONFIG.warning, filter: "warning" },
                { label: "Suggestions", count: suggestionCount, config: SEVERITY_CONFIG.suggestion, filter: "suggestion" },
              ].map(item => (
                <button key={item.label} onClick={() => setSeverityFilter(severityFilter === item.filter ? "all" : item.filter)}
                  className={`w-full flex items-center justify-between p-3 rounded-xl ${item.config.bg} border ${item.config.border} transition-colors hover:opacity-80`}>
                  <div className="flex items-center gap-3">
                    <item.config.icon size={18} className={item.config.text} />
                    <span className={`text-sm font-medium ${item.config.text}`}>{item.label}</span>
                  </div>
                  <span className={`text-2xl font-bold ${item.config.text}`}>{item.count}</span>
                </button>
              ))}
              <div className={`pt-2 border-t ${borderColor}`}>
                <div className="flex items-center justify-between">
                  <span className={`text-xs ${textMuted}`}>Approved terms found</span>
                  <span className={`text-sm font-medium text-status-green`}>{terms.approved.filter(t => t.found).length}/{terms.approved.length}</span>
                </div>
                <div className="flex items-center justify-between mt-1">
                  <span className={`text-xs ${textMuted}`}>Forbidden terms found</span>
                  <span className={`text-sm font-medium text-status-red`}>{terms.forbidden.filter(t => t.found).length}</span>
                </div>
              </div>
            </div>
          </div>

          {/* View Tabs */}
          <div className={`flex items-center gap-1 p-1 rounded-xl ${inputBg} w-fit`}>
            {[
              { id: "dashboard", icon: List, label: "Findings" },
              { id: "heatmap", icon: Grid3X3, label: "Terminology" },
            ].map(tab => (
              <button key={tab.id} onClick={() => setView(tab.id)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium transition-colors ${
                  view === tab.id
                    ? `${cardBg} ${textPrimary} shadow-sm`
                    : `${textMuted} ${hoverBg}`}`}>
                <tab.icon size={14} />
                {tab.label}
              </button>
            ))}
          </div>

          {/* Findings Filters */}
          {(view === "dashboard") && (
            <>
              <div className="flex items-center gap-2 flex-wrap">
                <Filter size={14} className={textMuted} />
                <select value={severityFilter} onChange={e => setSeverityFilter(e.target.value)}
                  className={`px-2.5 py-1.5 rounded-lg text-xs ${inputBg} border ${inputBorder} ${textSecondary}`}>
                  <option value="all">All severities</option>
                  <option value="critical">Critical</option>
                  <option value="warning">Warning</option>
                  <option value="suggestion">Suggestion</option>
                </select>
                <select value={categoryFilter} onChange={e => setCategoryFilter(e.target.value)}
                  className={`px-2.5 py-1.5 rounded-lg text-xs ${inputBg} border ${inputBorder} ${textSecondary}`}>
                  <option value="all">All categories</option>
                  {categories.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
                <span className={`text-xs ${textMuted}`}>{filteredFindings.length} findings</span>
              </div>
              <div className="space-y-3">
                {filteredFindings.map(f => <FindingCard key={f.id} finding={f} />)}

                  <div className={`text-center py-12 ${textMuted}`}>
                    <CheckCircle size={32} className="mx-auto mb-3 text-status-green" />
                    <p className="text-sm">No findings match your filters</p>
                  </div>
                )}
              </div>
            </>
          )}

          {/* Heatmap View */}
          {view === "heatmap" && (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div className={`${cardBg} border ${borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>
                <div className="flex items-center gap-2 mb-4">
                  <CheckCircle size={16} className="text-status-green" />
                  <h3 className={`text-sm font-semibold ${textPrimary}`}>Approved Terms</h3>
                </div>
                <div className="flex flex-wrap gap-2">
                  {terms.approved.map(t => (
                    <span key={t.term} className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors cursor-default ${
                      t.found
                        ? "bg-status-green/10 border-status-green/30 text-status-green"
                        : `${darkMode ? "bg-surface-2 border-bdark-hover text-txt-muted" : "bg-gray-100 border-gray-200 text-gray-400"}`}`}>
                      {t.term} {t.found ? `(${t.count})` : "—"}
                    </span>
                  ))}
                  {terms.approved.length === 0 && <span className={`text-xs ${textMuted}`}>No terminology data</span>}

                <p className={`text-xs ${textMuted} mt-4`}>

              <div className={`${cardBg} border ${borderColor} rounded-2xl p-6 ${darkMode ? "card-elevated" : ""}`}>

                      t.found
                        ? "bg-status-red/10 border-status-red/30 text-status-red"
                        : "bg-status-green/10 border-status-green/30 text-status-green"}`}>
                      {t.found ? "⚠ " : "✓ "}{t.term} {t.found ? `(${t.count})` : ""}
                    </span>
                  ))}
                  {terms.forbidden.length === 0 && <span className={`text-xs ${textMuted}`}>No terminology data</span>}
                </div>
                <p className={`text-xs ${textMuted} mt-4`}>
                  {terms.forbidden.filter(t => t.found).length} forbidden terms detected.
                  Green terms are correctly absent from the content.
                </p>
              </div>
            </div>
          )}
        </div>
      );

      // ─── Doc Panel ─────────────────────────────
      const DocPanel = () => (
        <div className={`fixed inset-y-0 right-0 w-full max-w-lg z-40 ${darkMode ? "bg-surface-3" : "bg-white"} border-l ${borderColor} modal-elevated transform transition-transform ${docPanelOpen ? "translate-x-0" : "translate-x-full"}`}>
          <div className={`flex items-center justify-between p-4 border-b ${borderColor}`}>
            <h3 className={`text-sm font-semibold ${textPrimary}`}>Messaging Guidelines</h3>
            <button onClick={() => setDocPanelOpen(false)} className={`${textMuted} hover:${textPrimary}`}>
              <X size={18} />
            </button>
          </div>
          <div className={`p-4 border-b ${borderColor}`}>
            <div className={`flex items-center gap-3 p-3 rounded-xl ${inputBg}`}>
              <FileText size={20} className="text-brand-blue" />
              <div className="flex-1">
                <p className={`text-sm font-medium ${textPrimary}`}>Brand Guidelines</p>
                <p className={`text-xs ${textMuted}`}>Live from GitHub · 7 files · Auto-refreshed hourly</p>
              </div>
            </div>
          </div>
          <div className={`p-4 overflow-y-auto`} style={{ height: "calc(100% - 140px)" }}>
            <div className="space-y-2">
              {[
                { file: "terminology.md", label: "Approved & Forbidden Terms" },
                { file: "tone.md", label: "Tone of Voice & Writing Style" },
                { file: "positioning.md", label: "Product Positioning" },
                { file: "narrative.md", label: "Messaging Hierarchy & Narrative" },
                { file: "value-story.md", label: "Value Story & Differentiation" },
                { file: "boilerplates.md", label: "Boilerplates & Templates" },
                { file: "ui-micro-copy.md", label: "UI Micro-Copy Patterns" },
              ].map((section) => (
                <a key={section.file}
                  href={`https://github.com/cruciate-hub/marketing-team/blob/main/messaging/${section.file}`}
                  target="_blank" rel="noopener noreferrer"
                  className={`w-full text-left px-3 py-2 rounded-lg text-xs ${textSecondary} ${hoverBg} transition-colors flex items-center gap-2`}>
                  <ChevronRight size={12} className={textMuted} />
                  <span className="flex-1">{section.label}</span>
                  <ExternalLink size={10} className={textMuted} />
                </a>
              ))}
            </div>
          </div>
        </div>
      );

      // ─── Sidebar ───────────────────────────────
      const Sidebar = () => (
        <div className={`${sidebarOpen ? "w-64" : "w-0 overflow-hidden"} flex-shrink-0 border-r ${borderColor} ${cardBg} transition-all duration-200 flex flex-col`}>
          <div className="p-4 flex-1 overflow-y-auto">
            {/* Messaging Doc */}
            <div className="mb-6">
              <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Source of Truth</p>
              <button onClick={() => setDocPanelOpen(true)}
                className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl ${inputBg} border ${inputBorder} ${hoverBg} transition-colors text-left`}>
                <FileText size={16} className="text-brand-blue flex-shrink-0" />
                <div className="min-w-0 flex-1">
                  <p className={`text-xs font-medium ${textPrimary} truncate`}>Brand Guidelines</p>
                  <p className={`text-xs ${textMuted}`}>Live · 7 files from GitHub</p>
                </div>
              </button>
            </div>

            {/* Quick Pages */}
            <div className="mb-6">
              <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Quick Check</p>
              <div className="space-y-1">
                {QUICK_PAGES.slice(0, 6).map(page => (
                  <button key={page.url} onClick={() => handleQuickAnalyze(page.url)}
                    className={`w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left ${hoverBg} transition-colors`}>
                    <span className="text-xs">{page.icon}</span>
                    <span className={`text-xs ${textSecondary}`}>{page.label}</span>
                    <ExternalLink size={10} className={`${textMuted} ml-auto`} />
                  </button>
                ))}
              </div>
            </div>

            {/* History */}
            <div>
              <p className={`text-xs font-medium ${textMuted} uppercase tracking-wider mb-2`}>Recent</p>
              <div className="space-y-1">
                {history.length === 0 && <p className={`text-xs ${textMuted} px-3`}>No analyses yet</p>}
                {history.map((item, i) => (
                  <div key={i} className={`flex items-center gap-2 px-3 py-2 rounded-lg ${hoverBg} transition-colors`}>
                    <Clock size={12} className={textMuted} />
                    <div className="flex-1 min-w-0">
                      <p className={`text-xs ${textSecondary} truncate`}>{item.url}</p>
                      <p className={`text-xs ${textMuted}`}>{item.date}</p>
                    </div>
                    <span className={`text-xs font-bold ${getScoreColor(item.score)}`}>{item.score}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      // ─── Main Layout ───────────────────────────
      return (
        <div className={`${bg} min-h-screen flex flex-col`} style={{ fontFamily: "'Figtree', 'Inter', sans-serif" }}>
          <ErrorBanner />

          {/* Header */}
          <header className={`h-14 border-b ${borderColor} ${cardBg} flex items-center justify-between px-4 flex-shrink-0 z-30`}>
            <div className="flex items-center gap-3">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className={`p-1.5 rounded-lg ${hoverBg} ${textMuted} transition-colors`}>
                <Menu size={18} />
              </button>
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg brand-gradient-bg flex items-center justify-center">
                  <Zap size={14} className="text-white" />
                </div>
                <span className={`text-sm font-bold ${textPrimary}`}>Lighthouse</span>
                <span className="text-xs px-2 py-0.5 rounded-full bg-brand-blue/10 text-brand-blue">v1.0</span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => setDocPanelOpen(true)}
                className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs ${inputBg} border ${inputBorder} ${textSecondary} ${hoverBg} transition-colors`}>
                <BookOpen size={14} />
                <span className="hidden sm:inline">Guidelines</span>
              </button>
              <button onClick={() => setDarkMode(!darkMode)}
                className={`p-2 rounded-lg ${hoverBg} ${textMuted} transition-colors`}>
                {darkMode ? <Sun size={16} /> : <Moon size={16} />}
              </button>
              <button onClick={() => setSettingsOpen(true)}
                className={`p-2 rounded-lg ${hoverBg} ${textMuted} transition-colors`}>
                <Settings size={16} />
              </button>
            </div>
          </header>

          {/* Body */}
          <div className="flex flex-1 overflow-hidden">
            <Sidebar />
            <main className="flex-1 overflow-y-auto p-4 md:p-6">
              {view === "input" ? <InputView /> : <DashboardView />}
            </main>
          </div>

          {/* Doc Panel Overlay */}
          {docPanelOpen && <div className="fixed inset-0 z-30 bg-black/40" onClick={() => setDocPanelOpen(false)} />}
          <DocPanel />

          {/* Settings Modal */}
          {settingsOpen && (
            <>
              <div className="fixed inset-0 z-40 bg-black/40" onClick={() => setSettingsOpen(false)} />
              <div className={`fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 w-full max-w-md ${darkMode ? "bg-surface-3" : "bg-white"} border ${borderColor} rounded-2xl modal-elevated p-6`}>
                <div className="flex items-center justify-between mb-6">
                  <h3 className={`text-lg font-semibold ${textPrimary}`}>Settings</h3>
                  <button onClick={() => setSettingsOpen(false)} className={textMuted}><X size={18} /></button>
                </div>
                <div className="space-y-4">
                  {[
                    { label: "Dark mode", desc: "Toggle dark/light theme", checked: darkMode, onChange: () => setDarkMode(!darkMode) },
                    { label: "Show suggestions", desc: "Include rewrite suggestions in findings", checked: true, onChange: () => {} },
                    { label: "Auto-expand critical", desc: "Automatically expand critical findings", checked: false, onChange: () => {} },
                    { label: "Include doc references", desc: "Show messaging doc section references", checked: true, onChange: () => {} },
                  ].map(setting => (
                    <div key={setting.label} className="flex items-center justify-between">
                      <div>
                        <p className={`text-sm ${textPrimary}`}>{setting.label}</p>
                        <p className={`text-xs ${textMuted}`}>{setting.desc}</p>
                      </div>
                      <button onClick={setting.onChange} className={`w-10 h-6 rounded-full transition-colors relative ${setting.checked ? "bg-brand-blue" : darkMode ? "bg-surface-2" : "bg-gray-300"}`}>
                        <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-transform ${setting.checked ? "left-5" : "left-1"}`} />
                      </button>
                    </div>
                  ))}
                </div>
                <div className={`mt-6 pt-4 border-t ${borderColor}`}>
                  <p className={`text-xs ${textMuted}`}>Lighthouse v1.0.0 · Brand Messaging Auditor</p>
                  <p className={`text-xs ${textMuted}`}>AI backend: Claude Sonnet · Guidelines: Live from GitHub</p>
                  <p className={`text-xs ${textMuted}`}>Worker: {WORKER_URL || "local"}</p>
                </div>
              </div>
            </>
          )}

          {/* Analyzing Overlay */}
          {analyzing && <AnalyzingOverlay />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Lighthouse />);
  </script>
</body>
</html>
